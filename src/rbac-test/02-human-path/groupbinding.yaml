apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-pods-binding
  namespace: rbac-test
subjects:
- kind: Group
  name: developers # This matches the /O=developers in the certificate!
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io