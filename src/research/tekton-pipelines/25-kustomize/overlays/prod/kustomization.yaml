apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: tekton-prod

commonLabels:
  environment: production

# Production patches: more retries, longer timeouts, bundle resolver references
patches:
  - target:
      kind: Pipeline
      name: app-ci
    patch: |
      - op: add
        path: /spec/tasks/0/retries
        value: 3
      - op: add
        path: /spec/tasks/0/timeout
        value: "1h"
  # In production, you'd also patch taskRef to use bundle resolvers:
  # - target:
  #     kind: Pipeline
  #     name: app-ci
  #   patch: |
  #     - op: replace
  #       path: /spec/tasks/0/taskRef
  #       value:
  #         resolver: bundles
  #         params:
  #           - name: bundle
  #             value: "registry.example.com/tekton-catalog/app-build:v1.2.0"
  #           - name: name
  #             value: app-build
  #           - name: kind
  #             value: Task
