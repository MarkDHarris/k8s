apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-runner
  namespace: default
---
# Role granting permissions needed by Tekton pipelines in this namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-role
  namespace: default
rules:
  # Needed to create/read PVCs for workspaces
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  # Needed if tasks read/create configmaps or secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  # Needed if tasks interact with pods (e.g., debug, port-forward)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-role-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: pipeline-runner
    namespace: default
roleRef:
  kind: Role
  name: pipeline-role
  apiGroup: rbac.authorization.k8s.io
---
# Secret for Git authentication (basic auth pattern used in production)
apiVersion: v1
kind: Secret
metadata:
  name: git-basic-auth
  namespace: default
  annotations:
    tekton.dev/git-0: https://github.com
type: kubernetes.io/basic-auth
stringData:
  username: "your-username"
  password: "your-token-or-password"
---
# Secret for container registry credentials
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: default
  annotations:
    tekton.dev/docker-0: https://index.docker.io
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "https://index.docker.io": {
          "username": "your-username",
          "password": "your-token"
        }
      }
    }
