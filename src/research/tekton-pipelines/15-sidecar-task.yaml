apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sidecar-demo
spec:
  description: |
    Demonstrates a Task with a sidecar container. The sidecar runs a simple
    HTTP server, and the main step queries it. In production, sidecars are used
    for Docker-in-Docker (DinD), database instances, mock APIs, or service meshes.
  steps:
    - name: wait-for-server
      image: alpine:3
      script: |
        #!/bin/sh
        echo "Waiting for sidecar HTTP server to be ready..."
        apk add --no-cache curl > /dev/null 2>&1
        for i in $(seq 1 30); do
          if curl -s http://localhost:8080/health > /dev/null 2>&1; then
            echo "Sidecar is ready!"
            break
          fi
          echo "  attempt $i: not ready yet..."
          sleep 1
        done

    - name: use-sidecar
      image: alpine:3
      script: |
        #!/bin/sh
        apk add --no-cache curl > /dev/null 2>&1
        echo "Querying the sidecar service..."
        echo ""
        echo "GET /health:"
        curl -s http://localhost:8080/health
        echo ""
        echo ""
        echo "GET /data:"
        curl -s http://localhost:8080/data
        echo ""
        echo ""
        echo "Sidecar interaction complete!"

  sidecars:
    - name: mock-server
      image: python:3-alpine
      script: |
        #!/usr/bin/env python3
        from http.server import HTTPServer, BaseHTTPRequestHandler
        import json

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                if self.path == '/health':
                    self.wfile.write(json.dumps({"status": "healthy"}).encode())
                elif self.path == '/data':
                    self.wfile.write(json.dumps({
                        "items": ["alpha", "beta", "gamma"],
                        "count": 3,
                        "source": "sidecar-mock-server"
                    }).encode())
                else:
                    self.wfile.write(json.dumps({"error": "not found"}).encode())
            def log_message(self, format, *args):
                pass  # suppress request logging

        HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
