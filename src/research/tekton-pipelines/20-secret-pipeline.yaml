apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: clone-private-repo
spec:
  description: |
    Clones a Git repository using credentials from a Kubernetes Secret.
    The secret is linked to the ServiceAccount, and Tekton automatically
    mounts it for Git operations.
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: output
      description: Where to clone the repo
  results:
    - name: commit-sha
      description: The commit SHA that was cloned
  steps:
    - name: clone
      image: alpine/git:latest
      script: |
        #!/bin/sh
        echo "Cloning $(params.repo-url) @ $(params.revision)..."
        cd "$(workspaces.output.path)"
        git clone --depth 1 --branch "$(params.revision)" "$(params.repo-url)" repo 2>/dev/null || {
          echo "(Clone would use credentials from the linked ServiceAccount)"
          echo "(For this demo, using a public repo)"
          git clone --depth 1 "$(params.repo-url)" repo
        }
        cd repo
        COMMIT=$(git rev-parse HEAD)
        printf "%s" "$COMMIT" > "$(results.commit-sha.path)"
        echo "Cloned at commit: $COMMIT"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: secret-env-demo
spec:
  description: |
    Demonstrates accessing secrets as environment variables within a Task.
    This pattern is used when tasks need API tokens, webhook URLs, or
    other credentials that aren't Git/Docker related.
  params:
    - name: action
      type: string
      default: "show-config"
  steps:
    - name: use-secret
      image: alpine:3
      env:
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: demo-api-token
              key: token
              optional: true
        - name: WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: demo-api-token
              key: webhook-url
              optional: true
      script: |
        #!/bin/sh
        echo "Action: $(params.action)"
        echo ""
        if [ -n "$API_TOKEN" ]; then
          echo "API_TOKEN is set (length: ${#API_TOKEN} chars)"
          echo "  First 4 chars: $(echo $API_TOKEN | cut -c1-4)..."
        else
          echo "API_TOKEN is not set (secret may not exist -- this is expected in the demo)"
        fi
        if [ -n "$WEBHOOK_URL" ]; then
          echo "WEBHOOK_URL is set"
        else
          echo "WEBHOOK_URL is not set (secret may not exist -- this is expected in the demo)"
        fi
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: rbac-secret-demo
spec:
  params:
    - name: repo-url
      type: string
      default: "https://github.com/tektoncd/pipeline.git"
  workspaces:
    - name: shared-data

  tasks:
    - name: clone
      taskRef:
        name: clone-private-repo
      params:
        - name: repo-url
          value: "$(params.repo-url)"
      workspaces:
        - name: output
          workspace: shared-data

    - name: show-secrets
      taskRef:
        name: secret-env-demo
      runAfter:
        - clone
