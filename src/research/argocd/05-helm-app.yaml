apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: helm-guestbook
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: replicaCount
          value: "2"
        - name: service.type
          value: NodePort
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-demo
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
