apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev
namePrefix: dev-

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: guestbook-ui
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /metadata/labels/env
        value: dev
