apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-local
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MarkDHarris/k8s.git
    targetRevision: HEAD
    path: src/research/argocd/apps/guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
