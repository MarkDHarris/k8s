kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

# 1. Registry Configuration
# This patch tells every node to look for registry configs in the folder 
# where we will inject our "localhost:5001" mapping later.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"

nodes:
  # 2. The Control Plane (The Entry Point)
  - role: control-plane
    # This label is a "Pro Tip": It tells the Ingress Controller 
    # "Run here, because this node creates the bridge to the host."
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    
    # 3. Port Mappings (The Holes in the Firewall)
    extraPortMappings:
      # Maps host 80 -> container 80 (Standard HTTP)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # Maps host 443 -> container 443 (Standard HTTPS)
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Maps host 8080 -> container 30000 (Your specific NodePort example)
      - containerPort: 30000
        hostPort: 8080
        protocol: TCP

  # 4. The Workers (The Muscle)
  # --- Node 2: Worker 1 ---
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "tier=worker1"

  # --- Node 3: Worker 2 ---
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "tier=worker2"

  # --- Node 4: Worker 3 ---
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "tier=worker3"

