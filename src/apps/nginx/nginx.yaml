# =============================================================================
# Demo NGINX Application -- Kubernetes Manifests
# =============================================================================
# These manifests deploy the same resources as ../../terraform/app_demo/:
#
#   1. Namespace  (demo)
#   2. Deployment (nginx, 2 replicas with health probes)
#   3. Service    (ClusterIP, port 80)
#   4. Ingress    (routes http://localhost/ to the Service)
#
# The NGINX Ingress Controller is deployed separately via the official
# Kind-specific manifest (see README.md for the command).
#
# TERRAFORM EQUIVALENT:
#   This file is the kubectl/YAML equivalent of the kubernetes_* resources
#   in terraform/app_demo/main.tf. Each resource below maps 1:1 to a
#   Terraform resource block:
#
#     Namespace  → kubernetes_namespace.demo
#     Deployment → kubernetes_deployment_v1.nginx
#     Service    → kubernetes_service_v1.nginx
#     Ingress    → kubernetes_ingress_v1.nginx
#
# TRAFFIC FLOW:
#   Browser → localhost:80 → Docker port mapping → Kind node:80 →
#   NGINX Ingress Controller → ClusterIP Service → Pod
#
# USAGE:
#   kubectl apply -f nginx.yaml
# =============================================================================


# --- Namespace ---
# Isolate the demo app in its own namespace (same as Terraform's
# kubernetes_namespace.demo resource).
apiVersion: v1
kind: Namespace
metadata:
  name: demo

---

# --- Deployment ---
# Creates a ReplicaSet that maintains 2 nginx pod replicas.
# Includes liveness and readiness probes matching the Terraform configuration.
#
# TERRAFORM EQUIVALENT:
#   resource "kubernetes_deployment_v1" "nginx" { ... }
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: demo
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
              protocol: TCP
          # Liveness probe -- kubelet restarts the container if this fails.
          # The Ingress Controller also won't route traffic to unhealthy pods.
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          # Readiness probe -- pod is removed from Service endpoints until
          # this passes, preventing traffic to pods that aren't ready.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

---

# --- Service (ClusterIP) ---
# Gives the nginx pods a stable internal address (nginx.demo.svc.cluster.local)
# and load-balances across all healthy replicas. The Ingress resource below
# references this Service by name.
#
# WHY ClusterIP (not NodePort)?
# The Ingress Controller handles external traffic on ports 80/443. This
# Service only needs to be reachable inside the cluster. This is the standard
# production pattern: external traffic → Ingress → ClusterIP Service → Pods.
#
# TERRAFORM EQUIVALENT:
#   resource "kubernetes_service_v1" "nginx" { ... }
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: demo
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP

---

# --- Ingress ---
# Routes external HTTP traffic to the nginx Service. This tells the NGINX
# Ingress Controller: "route HTTP traffic for path '/' to the nginx Service
# on port 80."
#
# Because the Ingress Controller is bound to hostPorts 80/443 on the
# control-plane node (via the Kind-specific manifest), and the Kind node has
# extraPortMappings forwarding host ports 80/443, the full chain is:
#   curl http://localhost → host:80 → Kind node:80 → Ingress Controller →
#   this Ingress rule → nginx Service:80 → nginx Pod:80
#
# TERRAFORM EQUIVALENT:
#   resource "kubernetes_ingress_v1" "nginx" { ... }
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  namespace: demo
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
